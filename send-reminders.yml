name: Send Daily Reminders

on:
  # Runs every 5 minutes. GitHub guarantees best-effort — may run slightly late during high load.
  # This is fine: the script checks a 5-minute sliding window so no notification is ever missed.
  schedule:
    - cron: '*/5 * * * *'

  # Lets you trigger a test run manually from the Actions tab
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 5   # Kill the job if it hangs (keeps minutes usage low)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Send push reminders
        env:
          VAPID_PUBLIC_KEY:          ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:         ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CONTACT_EMAIL:       ${{ secrets.VAPID_CONTACT_EMAIL }}
          FIREBASE_SERVICE_ACCOUNT:  ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node send-reminders.js
        working-directory: scripts
