name: Tech Tree Worker

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  process-tech-tree-requests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Process tech tree requests
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY:           ${{ secrets.NVIDIA_API_KEY }}
          # Optional — enables the "Your map is ready" push (spec §4.4). Reuses
          # the VAPID keys that already power the reminders worker; if absent,
          # generation still succeeds and push is silently skipped.
          VAPID_PUBLIC_KEY:         ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:        ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CONTACT_EMAIL:      ${{ secrets.VAPID_CONTACT_EMAIL }}
        run: node generate-tech-tree.js
        working-directory: scripts
